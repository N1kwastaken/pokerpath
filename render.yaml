# Blueprint do Render — deploy do PokerPath num serviço só (API + site).
# A API Fastify serve o build do web em produção; o banco é Postgres no Neon
# (DATABASE_URL é colada manualmente no painel — sync: false).
#
# Uso: Render Dashboard → New → Blueprint → conectar este repositório.
services:
  - type: web
    name: pokerpath
    runtime: node
    plan: free
    # Build: instala tudo, compila shared+api+web e prepara o banco
    # (schema Postgres gerado do schema.prisma + db push + seed idempotente).
    # --include=dev é obrigatório: o Render exporta NODE_ENV=production no
    # build, o que faria o npm ci pular as devDependencies (tsc, vite, tsx).
    # deploy:generate roda ANTES do build: o tsc precisa do client Prisma
    # gerado (o postinstall do npm workspaces não encontra o schema sozinho).
    buildCommand: npm ci --include=dev && npm run deploy:generate -w @pokerpath/api && npm run build && npm run deploy:db -w @pokerpath/api
    startCommand: npm run start -w @pokerpath/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION # Node 22 LTS (sem pin, o Render usa a mais nova)
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL # cole aqui a connection string do Neon (com ?sslmode=require)
        sync: false
      # URL pública: usada no CORS e, principalmente, para montar o LINK dos
      # e-mails. Explícita de propósito — o fallback era RENDER_EXTERNAL_URL e,
      # se ele não estiver presente, o link do reset apontaria para localhost.
      - key: WEB_ORIGIN
        value: https://pokerpath.onrender.com
      # Beta aberto: contas novas nascem com Premium liberado (isDev=true).
      # NO LANÇAMENTO, trocar para "false" — quem já se cadastrou MANTÉM o
      # Premium, porque o campo é gravado no cadastro e não recalculado.
      - key: BETA_SIGNUP
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # ─── E-mail (opcional) ───────────────────────────────────
      # Sem MAIL_DRIVER=resend nada é enviado: o driver 'console' só loga.
      # Resend exige domínio verificado para enviar a qualquer endereço; sem
      # domínio, a chave de teste só entrega no e-mail dono da conta Resend.
      - key: MAIL_DRIVER # 'console' (padrão) ou 'resend'
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM # ex.: "PokerPath <ola@seudominio.com>"
        sync: false
      # Segredo do lembrete diário (POST /api/jobs/streak-reminder).
      # Sem ele a rota fica desligada. Use um agendador externo para chamar.
      - key: CRON_SECRET
        generateValue: true
