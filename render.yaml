# Blueprint do Render — deploy do PokerPath num serviço só (API + site).
# A API Fastify serve o build do web em produção; o banco é Postgres no Neon
# (DATABASE_URL é colada manualmente no painel — sync: false).
#
# Uso: Render Dashboard → New → Blueprint → conectar este repositório.
services:
  - type: web
    name: pokerpath
    runtime: node
    plan: free
    # Build: instala tudo, compila shared+api+web e prepara o banco
    # (schema Postgres gerado do schema.prisma + db push + seed idempotente).
    # --include=dev é obrigatório: o Render exporta NODE_ENV=production no
    # build, o que faria o npm ci pular as devDependencies (tsc, vite, tsx).
    # deploy:generate roda ANTES do build: o tsc precisa do client Prisma
    # gerado (o postinstall do npm workspaces não encontra o schema sozinho).
    buildCommand: npm ci --include=dev && npm run deploy:generate -w @pokerpath/api && npm run build && npm run deploy:db -w @pokerpath/api
    startCommand: npm run start -w @pokerpath/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION # Node 22 LTS (sem pin, o Render usa a mais nova)
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL # cole aqui a connection string do Neon (com ?sslmode=require)
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
