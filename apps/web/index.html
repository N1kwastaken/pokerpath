<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090C" media="(prefers-color-scheme: dark)" />
    <!-- PWA: "Adicionar à Tela de Início" (iOS/Android) abre em tela cheia,
         como app. O manifest declara nome, ícones e cores; as metas apple-*
         fazem o iOS abrir sem a barra do Safari. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PokerPath" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>PokerPath — Aprenda poker como um jogo</title>
    <meta name="description" content="Aprenda poker como um jogo: aulas curtas, mãos reais e o porquê de cada decisão." />
    <!-- Ícones: o SVG é o preferido (escala em qualquer tela); os PNGs cobrem
         quem não suporta SVG e a tela de início do iOS. -->
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Link compartilhado (WhatsApp, etc.) mostra card com a logo. -->
    <meta property="og:title" content="PokerPath — Aprenda poker como um jogo" />
    <meta property="og:description" content="Aulas curtas, mãos reais e o porquê de cada decisão." />
    <meta property="og:image" content="/logo-512.png" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
